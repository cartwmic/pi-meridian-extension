name: Sync upstream
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pi-patches
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/lnilluv/pi-meridian-extension.git || true
          git fetch upstream master
          git merge upstream/master --no-edit || echo "::warning::Merge conflict — manual resolution needed"
          git push
